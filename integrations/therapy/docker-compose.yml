services:
  postgres:
    image: postgres:16-alpine
    container_name: therapy_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: therapy
      POSTGRES_PASSWORD: therapy
      POSTGRES_DB: therapy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U therapy -d therapy"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../python/therapy-api
      dockerfile: ./Dockerfile.backend
    container_name: therapy_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      DEBUG: ${DEBUG:-false}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost:3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ../../python/therapy-api/src
          target: /app/src

  frontend:
    build:
      context: ../../js/therapy-v3
      dockerfile: ./Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: therapy_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ../../js/therapy-v3/src
          target: /app/src
        - action: rebuild
          path: ../../js/therapy-v3/package.json

  caddy:
    image: caddy:2-alpine
    container_name: therapy_caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    profiles:
      - prod

volumes:
  postgres_data:
  caddy_data:
  caddy_config: